services:
  # Development service
  app-dev:
    build:
      context: .
      target: development
    ports:
      - "4567:4567"
    volumes:
      - .:/app
    environment:
      - RACK_ENV=development
    command: ["rerun", "ruby", "app.rb", "--background", "--", "-o", "0.0.0.0"]

  # Production service
  app:
    build:
      context: .
      target: production
    ports:
      - "4567:4567"
    environment:
      - RACK_ENV=production
      - RAILS_ENV=production
      - PORT=4567
      - WEB_CONCURRENCY=2
      - RAILS_MAX_THREADS=5
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4567/oai?verb=Identify"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
